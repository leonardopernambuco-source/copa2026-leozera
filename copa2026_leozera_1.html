<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo | L10</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0e;--s1:#0e1118;--s2:#141820;--s3:#1c2230;
  --bd:#ffffff0d;--bd2:#ffffff16;--bd3:#ffffff22;
  --acc:#b8ff2e;--acc-d:#8fd400;--acc-dim:#b8ff2e1a;--acc-glow:#b8ff2e33;
  --blu:#3d9df5;--blu-d:#1a7dd4;
  --grn:#22d97a;--grn-d:#18a85e;
  --red:#f54646;--red-d:#c43030;
  --amb:#f5a623;--amb-d:#c47f10;
  --tx:#edf0f8;--tx2:#9aa5c0;--tx3:#5a6480;--tx4:#2d3348;
  --r4:4px;--r6:6px;--r8:8px;--r12:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;font-size:14px;line-height:1.4;overflow-x:hidden}

/* ── TOPBAR ─────────────────────────────── */
.topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--bd2);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:50}
.brand{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;letter-spacing:.06em;color:var(--acc);white-space:nowrap;text-transform:uppercase}
.brand span{color:var(--tx);opacity:.5;font-weight:300;margin:0 6px}
.top-divider{width:1px;height:24px;background:var(--bd2);margin:0 4px}
.top-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3);letter-spacing:.04em}
.top-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.cal-badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--acc);background:var(--acc-dim);border:1px solid var(--acc-glow);border-radius:var(--r4);padding:3px 8px}

/* ── SHELL ───────────────────────────────── */
.shell{display:flex;height:calc(100vh - 52px)}

/* ── SIDEBAR ─────────────────────────────── */
.sb{width:56px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:2px;overflow:hidden;flex-shrink:0}
.ni{width:40px;height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border-radius:var(--r8);color:var(--tx3);transition:all .15s;border:1px solid transparent}
.ni:hover{color:var(--tx2);background:var(--s3)}
.ni.on{color:var(--acc);background:var(--acc-dim);border-color:var(--acc-glow)}
.ni svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni-lbl{font-size:8px;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.06em;text-transform:uppercase}

/* ── MAIN ─────────────────────────────────── */
.main{flex:1;overflow-y:auto;overflow-x:hidden}
.pg{display:none;padding:20px 28px}.pg.on{display:block}

/* ── PAGE HEADER ─────────────────────────── */
.ph{display:flex;align-items:baseline;gap:12px;margin-bottom:18px}
.ph-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;letter-spacing:.04em;text-transform:uppercase;color:var(--acc)}
.ph-sub{font-size:12px;color:var(--tx3);font-family:'Barlow Condensed',sans-serif;font-weight:400;letter-spacing:.04em;text-transform:uppercase}

/* ── METRIC STRIP ─────────────────────────── */
.mstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.mcard{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r8);padding:10px 14px;display:flex;flex-direction:column;gap:3px}
.mc-l{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.mc-v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600}
.c-acc{color:var(--acc)}.c-grn{color:var(--grn)}.c-red{color:var(--red)}.c-amb{color:var(--amb)}.c-blu{color:var(--blu)}

/* ── DAY DIVIDER ─────────────────────────── */
.day-div{display:flex;align-items:center;gap:10px;margin:14px 0 8px}
.day-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx);white-space:nowrap}
.day-line{flex:1;height:1px;background:linear-gradient(90deg,var(--bd2),transparent)}
.day-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--acc);background:var(--acc-dim);border:1px solid var(--acc-glow);border-radius:var(--r4);padding:2px 7px}

/* ── MATCH CARD ─────────────────────────── */
.mc{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r8);margin-bottom:4px;transition:border-color .15s;overflow:hidden}
.mc:hover{border-color:var(--bd3)}
.mc.done{border-left:2px solid var(--grn)}
.mc.val{border-left:2px solid var(--acc)}

/* TOP ROW — placar/horário */
.mc-top{display:grid;grid-template-columns:180px 1fr 200px;align-items:center;padding:0;min-height:54px}
.mc-left{display:flex;flex-direction:column;justify-content:center;gap:3px;padding:9px 14px;border-right:1px solid var(--bd)}.mc-badge{display:flex;align-items:center;gap:5px}
.mc-badge-g{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase}
.mc-badge-r{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--tx4);background:var(--s3);border-radius:3px;padding:1px 4px}

/* team block */
.flag{width:24px;height:18px;border-radius:2px;object-fit:cover;background:var(--s3);flex-shrink:0}
.tname{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;letter-spacing:.02em;text-transform:uppercase;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tname.dim{color:var(--tx3)}

/* score block */
.sc-live{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--acc);letter-spacing:.04em;line-height:1}
.sc-time{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:#c89040;line-height:1}
.sc-prev{font-family:'JetBrains Mono',monospace;font-size:10px;color:#8a9abf;line-height:1;margin-top:2px;letter-spacing:.02em}

/* right meta */
.mc-city{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--tx);letter-spacing:.03em;text-align:right}.mc-left-g{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:var(--tx2);letter-spacing:.06em;text-transform:uppercase}.mc-left-r{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--tx2);background:var(--s3);border:1px solid var(--bd2);border-radius:3px;padding:1px 5px;display:inline-block;margin-left:4px}
.mc-est{font-size:10px;color:var(--tx2);text-align:right;margin-top:1px}
.mc-actions{display:flex;gap:5px;margin-top:3px}

/* BTNS */
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;border-radius:var(--r4);padding:5px 12px;cursor:pointer;transition:all .12s;border:1px solid transparent;white-space:nowrap}
.btn-reg{background:var(--acc-dim);color:var(--acc);border-color:var(--acc-glow)}
.btn-reg:hover{background:var(--acc);color:#080a0e}
.btn-done{background:rgba(34,217,122,.08);color:var(--grn);border-color:rgba(34,217,122,.2)}
.btn-done:hover{background:rgba(34,217,122,.15)}
.btn-ana{background:transparent;color:var(--tx3);border-color:var(--bd2)}
.btn-ana:hover{color:var(--tx2);border-color:var(--bd3)}
.btn-sm{font-size:10px;padding:3px 8px}

/* ANA PANEL */
.mc-ana{display:none}
.mc-ana.open{display:none}

/* ANA GRID: texto | odds | mercados | % */
.ana-grid{display:grid;grid-template-columns:1fr 220px;gap:16px;align-items:start;width:100%}.ana-right{display:flex;flex-direction:column;gap:10px}
.ana-txt{font-size:13px;color:var(--tx2);line-height:1.7}
.ana-obs{font-size:11px;color:var(--tx3);font-style:italic;margin-top:5px;padding-top:5px;border-top:1px solid var(--bd)}

/* ODDS */
.odds-block{display:flex;flex-direction:column;gap:5px}
.odds-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--acc);letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px}
.odd-row{display:flex;align-items:center;gap:6px}
.odd-lbl{font-size:10px;color:var(--tx);width:32px;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase}
.odd-bar-bg{flex:1;height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.odd-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.odd-pct{font-family:'JetBrains Mono',monospace;font-size:10px;width:28px;text-align:right;color:var(--tx2)}
.odd-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--tx);width:28px;text-align:right;flex-shrink:0}

/* MERCADOS */
.merc-block{display:flex;flex-direction:column;gap:4px}
.merc-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--acc);letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px}
.merc-pill{display:inline-flex;align-items:center;gap:3px;background:var(--s3);border:1px solid var(--bd2);border-radius:3px;padding:2px 6px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.03em;color:var(--tx2);cursor:default;white-space:nowrap}
.merc-pill.main{background:var(--acc-dim);border-color:var(--acc-glow);color:var(--acc)}
.merc-pill.alt{background:rgba(61,157,245,.08);border-color:rgba(61,157,245,.2);color:var(--blu)}
.merc-pill.cau{background:rgba(245,70,70,.06);border-color:rgba(245,70,70,.18);color:var(--red)}
.merc-pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
.merc-pills{display:flex;flex-wrap:wrap;gap:4px}

/* CALIBRAGEM */
.dev-block{display:flex;flex-direction:column;gap:5px}
.dev-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.dev-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px}
.dev-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--tx3);text-transform:uppercase;font-size:10px;letter-spacing:.04em}
.dev-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--tx)}
.dtag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.04em;border-radius:3px;padding:2px 7px;text-transform:uppercase}
.dtag.c{background:rgba(34,217,122,.08);color:var(--grn);border:1px solid rgba(34,217,122,.2)}
.dtag.z{background:rgba(245,70,70,.08);color:var(--red);border:1px solid rgba(245,70,70,.2)}
.dtag.p{background:rgba(245,166,35,.08);color:var(--amb);border:1px solid rgba(245,166,35,.2)}
.vtag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-glow);border-radius:3px;padding:1px 6px;text-transform:uppercase;letter-spacing:.05em}

/* ── GROUP TABLE ─────────────────────────── */
.gtab-wrap{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r12);overflow:hidden;margin-bottom:14px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);border-bottom:1px solid var(--bd);text-align:left}
.tbl th.c,.tbl td.c{text-align:center}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--bd);vertical-align:middle;color:var(--tx)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.mo{font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center}
.tc{display:flex;align-items:center;gap:8px}
.pos-1,.pos-2{color:var(--grn)}.pos-3{color:var(--amb)}.pos-4{color:var(--tx4)}
.pbadge{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.03em;margin-left:4px}
.pb1,.pb2{background:rgba(34,217,122,.1);color:var(--grn)}
.pb3{background:rgba(245,166,35,.1);color:var(--amb)}
.pb4{background:rgba(245,70,61,.08);color:var(--red);border:1px solid rgba(245,70,61,.15)}

/* ── TABS ─────────────────────────────────── */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:5px 11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--bd2);border-radius:var(--r4);background:transparent;color:var(--tx3);cursor:pointer;transition:all .1s}
.tab.on{background:var(--acc-dim);border-color:var(--acc-glow);color:var(--acc)}
.tab:hover:not(.on){color:var(--tx2);background:var(--s3)}

/* ── ARTILHEIROS ─────────────────────────── */
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.rank-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r12);padding:18px 22px}
.rank-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx);margin-bottom:14px;border-bottom:1px solid var(--bd);padding-bottom:10px}
.rrow{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--bd)}
.rrow:last-child{border-bottom:none}
.rn{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx4);width:16px;text-align:center;flex-shrink:0}
.rn.top{color:var(--acc)}
.rv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--acc)}

/* ── MODAL ───────────────────────────────── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mbg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd3);border-radius:var(--r12);padding:24px 28px;width:600px;max-width:96vw;max-height:92vh;overflow-y:auto}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;text-transform:uppercase;letter-spacing:.04em;color:var(--acc);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.flbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:4px;display:block}
.finp{width:100%;background:var(--s3);border:1px solid var(--bd2);border-radius:var(--r6);padding:9px 12px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:13px;outline:none;transition:border-color .12s}
.finp:focus{border-color:var(--acc-glow);box-shadow:0 0 0 2px var(--acc-dim)}
.frow{margin-bottom:12px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.gi{display:grid;grid-template-columns:110px 1fr 1fr 60px 36px;gap:6px;margin-bottom:5px;align-items:center}.gi-hdr{display:grid;grid-template-columns:110px 1fr 1fr 60px 36px;gap:6px;margin-bottom:3px}
.add-g{background:transparent;border:1px dashed var(--bd2);border-radius:var(--r6);color:var(--tx3);cursor:pointer;padding:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;width:100%;text-align:center;transition:all .1s;margin-top:4px}
.add-g:hover{border-color:var(--acc-glow);color:var(--acc)}
.rm-g{background:rgba(245,70,70,.1);border:1px solid rgba(245,70,70,.2);color:var(--red);border-radius:var(--r4);cursor:pointer;padding:6px;font-size:13px;line-height:1;font-family:'Barlow',sans-serif}
.rm-g:hover{background:rgba(245,70,70,.2)}
.fbtn{background:var(--acc);color:#080a0e;border:none;border-radius:var(--r6);padding:10px 22px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:opacity .1s}
.fbtn:hover{opacity:.88}
.fbtn2{background:transparent;color:var(--tx3);border:1px solid var(--bd2);border-radius:var(--r6);padding:10px 18px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;margin-left:8px;transition:all .1s}
.fbtn2:hover{color:var(--tx2)}
.fbtns{display:flex;align-items:center;margin-top:16px}

/* ── TOAST ───────────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--acc);color:#080a0e;border-radius:var(--r6);padding:10px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.06em;z-index:999;opacity:0;transform:translateY(10px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ── SCROLL ──────────────────────────────── */
.main::-webkit-scrollbar{width:4px}.main::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

@media(max-width:768px){
  /* SIDEBAR — vira barra inferior no mobile */
  .sb{width:100%;height:52px;flex-direction:row;justify-content:space-around;align-items:center;padding:0 8px;position:fixed;bottom:0;top:auto;left:0;right:0;z-index:50;border-right:none;border-top:1px solid var(--bd2)}
  .shell{flex-direction:column}
  .main{padding:12px 12px 70px;height:calc(100vh - 52px);overflow-y:auto}
  .ni{width:48px;height:44px;border-radius:8px;flex-direction:column;gap:2px}
  .ni-lbl{font-size:8px}

  /* TOPBAR */
  .topbar{padding:0 12px;gap:8px;height:48px}
  .brand{font-size:16px}
  .top-date{display:none}

  /* MÉTRICAS — 2 colunas */
  .mstrip{grid-template-columns:repeat(2,1fr)!important;gap:6px}
  .mcard{padding:10px 12px}
  .mc-v{font-size:18px}

  /* CARD DE JOGO — mobile layout vertical */
  .mc-top-mobile{display:flex!important}
  .mc>div[style*="display:flex;align-items:stretch"]{flex-direction:column!important;min-height:auto!important}

  /* Coluna esquerda ocupa linha inteira */
  .mc>div>div[style*="width:130px"]{width:100%!important;border-right:none!important;border-bottom:1px solid var(--bd);flex-direction:row!important;align-items:center!important;gap:10px!important;padding:8px 12px!important;flex-wrap:wrap}

  /* Times e placar em linha */
  .mc>div>div[style*="flex:1;display:flex;align-items:center;justify-content:flex-end"]{flex:none!important;width:auto!important;padding:8px 12px 0!important;justify-content:center!important}
  .mc>div>div[style*="flex:1;display:flex;align-items:center;justify-content:flex-start"]{flex:none!important;width:auto!important;padding:0 12px 0!important;justify-content:center!important}
  .mc>div>div[style*="width:100px"]{width:100%!important;padding:4px 12px!important;flex-direction:row!important;gap:8px!important;justify-content:center!important}
  .mc>div>div[style*="width:120px"]{width:100%!important;padding:4px 12px!important;flex-direction:row!important;gap:8px!important;justify-content:center!important}

  /* Coluna direita ocupa linha inteira */
  .mc>div>div[style*="width:380px"],.mc>div>div[style*="width:480px"],.mc>div>div[style*="width:290px"]{width:100%!important;border-left:none!important;border-top:1px solid var(--bd);padding:8px 12px!important}

  /* Grupos — coluna única */
  div[style*="grid-template-columns:480px 1fr"]{grid-template-columns:1fr!important}
  div[style*="grid-template-columns:auto 1fr"]{grid-template-columns:1fr!important}

  /* Rank grid */
  .rank-grid{grid-template-columns:1fr!important}

  /* Tabela grupos */
  .tbl{font-size:11px}
  .tbl th,.tbl td{padding:5px 4px}

  /* Day divider */
  .day-div{margin:10px 0 6px}
  .day-label{font-size:11px}

  /* Tabs */
  .tabs{gap:4px}
  .tab{padding:4px 8px;font-size:11px}

  /* ph titulo */
  .ph-title{font-size:22px}

  /* Cards artilheiros */
  .rank-card{padding:12px 14px}
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">Copa do Mundo<span>|</span>L10</div>
  <div class="top-divider"></div>
  <div class="top-date" id="top-date"></div>
  <div class="top-right">
    <div class="cal-badge" id="top-badge">0/72 jogos</div>

let S={results:{},scorers:{}};
function load(){const s=localStorage.getItem('copa26l10');if(s)S=JSON.parse(s);}
function save(){localStorage.setItem('copa26l10',JSON.stringify(S));}

// ----------------------------------------
// HELPERS
// ----------------------------------------
function today(){return new Date().toISOString().slice(0,10);}
const WKDAYS=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
const MONTHS=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
function fmtDay(d){
  const dt=new Date(d+'T12:00:00');
  return `${dt.getDate()} de ${MONTHS[dt.getMonth()]} — ${WKDAYS[dt.getDay()]}`;
}
function pct(odd){return Math.round(100/odd);}
function devCls(d){return d==='confirmou'?'c':d==='zebra'?'z':'p';}

// ----------------------------------------
// NAV
// ----------------------------------------
function nav(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  document.querySelectorAll('.ni').forEach(n=>{if(n.getAttribute('onclick')&&n.getAttribute('onclick').includes("'"+id+"'"))n.classList.add('on');});
  render(id);
}
function render(id){
  if(id==='dash')renderDash();
  if(id==='grupos')renderGrupos();
  if(id==='jogos')renderJogos();
  if(id==='art')renderArt();
}

function matchCard(j,anaOpen,showPts=false){

  // Pontuação atual dos times
  const _st=calcSt(j.g);
  const _home=_st.find(x=>x.name===j.home)||{pts:0,j:0};
  const _away=_st.find(x=>x.name===j.away)||{pts:0,j:0};

  const ph=pct(oh),pe=pct(oe),pa=pct(oa);
  const cls=(r?'done':'')+(j.val&&!r?' val':'');
  const devHtml=r&&r.dev?`<span class="dtag ${devCls(r.dev)}">${r.dev}</span>`:'';
  const valHtml=j.val&&!r?`<span class="vtag">Valor</span>`:'';

  const maisQt=m.m.length-3;
  const mercsHtml=mercVisiveis.map(x=>`<span class="merc-pill ${x.c}"><span class="merc-pill-dot"></span>${x.t}</span>`).join('');

    :'';

  return `<div class="mc ${cls}" id="mc-${j.id}">

    <!-- COL 1: grupo + data + botão (130px) -->

        <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--tx2);background:var(--s3);border:1px solid var(--bd2);border-radius:3px;padding:1px 5px">R${j.rd}</span>
      </div>
      <div style="font-size:10px;color:var(--tx3);line-height:1.3">${fmtDay(j.date)}</div>
      <div style="display:flex;gap:3px;margin-top:2px;flex-wrap:wrap">
        ${r
          ?`<button class="btn btn-done btn-sm" onclick="openM('${j.id}')">editar</button>`
          :`<button class="btn btn-reg btn-sm" onclick="openM('${j.id}')">registrar</button>`
        }
      </div>
      ${devHtml||valHtml?`<div style="display:flex;gap:3px;margin-top:2px;flex-wrap:wrap">${devHtml}${valHtml}</div>`:''}
    </div>

    <!-- COL 2: time home (flex 1) -->
    <div style="flex:1;display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:0 14px;min-width:0">
      ${fi(j.home,40,30)}
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;letter-spacing:.01em;text-transform:uppercase;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${j.home}</span>
      ${showPts?ptsBadge(_home.pts,_home.j):''}
    </div>

    <!-- COL 3: placar + cidade (120px) -->
    <div style="width:120px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;gap:3px">
      ${r
        ?`<div style="font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;color:var(--grn);line-height:1">${r.sh} – ${r.sa}</div>`
        :`<div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:#c89040;line-height:1">${j.brt}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#8a9abf;line-height:1;margin-top:2px">prev ${j.sim.replace('-','–')}</div>`
      }
      <div style="font-size:9px;color:var(--tx3);text-align:center;line-height:1.3;margin-top:2px;max-width:90px">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--tx2)">${j.city}</span>

      <div style="font-size:12px;color:var(--tx2);line-height:1.6">${j.analise}</div>

      <!-- Gols -->
      ${golsHtml?`<div style="display:flex;flex-wrap:wrap;gap:3px">${golsHtml}</div>`:''}

    </div>

  </div>
</div>`;
}

function renderDash(){
  const now=new Date();
  const tod=today();
  document.getElementById('top-date').textContent=now.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
  const played=Object.keys(S.results).length;
  document.getElementById('top-badge').textContent=`${played}/72 jogos`;
  // Calcular taxa ANTES de usar
  const gols=Object.values(S.results).reduce((a,r)=>a+(+r.sh||0)+(+r.sa||0),0);
  const conf=Object.values(S.results).filter(r=>r.dev==='confirmou').length;
  const zeb=Object.values(S.results).filter(r=>r.dev==='zebra').length;
  const parc=Object.values(S.results).filter(r=>r.dev==='parcial').length;
  const tot=conf+zeb+parc;
  const taxa=tot?Math.round(((conf+parc*.5)/tot)*100):null;
  // Atualizar subtítulo
  const subEl=document.getElementById('dash-sub');
  if(subEl) subEl.textContent=played>0?`${played} resultado${played>1?'s':''} registrado${played>1?'s':''}${taxa!==null?' · '+taxa+'% acerto':''}`:''

  // (variáveis já calculadas acima)
  const calRate=document.getElementById('dash-cal-rate');if(calRate)calRate.textContent=taxa!==null?taxa+'% acerto':'';
  const _dm=document.getElementById('dash-met');if(_dm)_dm.innerHTML=`
    <div class="mcard"><div class="mc-l">Jogos</div><div class="met-v c-acc">${played}/72</div></div>
    <div class="mcard"><div class="mc-l">Gols</div><div class="met-v c-acc">${gols}</div></div>
    <div class="mcard"><div class="mc-l">Confirmadas</div><div class="met-v c-grn">${conf}</div></div>
    <div class="mcard"><div class="mc-l">Parciais</div><div class="met-v c-amb">${parc}</div></div>
    <div class="mcard"><div class="mc-l">Zebras</div><div class="met-v c-red">${zeb}</div></div>
  `;

  // agrupar por dia para a listagem
  const todayGames=JOGOS.filter(j=>j.date===tod);
  const todSec=document.getElementById('dash-today-sec');
  const nxtSec=document.getElementById('dash-next-sec');

  if(todayGames.length){
    todayGames.sort((a,b)=>a.brt.localeCompare(b.brt));todSec.innerHTML=`<div class="day-div"><span class="day-label">Jogos de hoje — ${fmtDay(tod)}</span><span class="day-line"></span><span class="day-count">${todayGames.length} jogos</span></div>`+todayGames.map(j=>matchCard(j,false)).join('');
  } else {
    todSec.innerHTML='';
  }

  // próximos: pegar os próximos 8 não registrados, agrupar por dia
  const pend=JOGOS.filter(j=>!S.results[j.id]&&j.date>=tod).sort((a,b)=>a.date.localeCompare(b.date)||a.brt.localeCompare(b.brt));
  if(!pend.length){nxtSec.innerHTML='<p style="color:var(--tx3);font-size:13px;padding:16px 0">Todos os jogos foram registrados.</p>';return;}
  const byDay={};
  pend.forEach(j=>{(byDay[j.date]=byDay[j.date]||[]).push(j);});
  nxtSec.innerHTML=Object.keys(byDay).sort().map(date=>{const games=byDay[date];return `<div class="day-div"><span class="day-label">${fmtDay(date)}</span><span class="day-line"></span><span class="day-count">${games.length} jogos</span></div>`+games.sort((a,b)=>a.brt.localeCompare(b.brt)).map(j=>matchCard(j,false,false)).join('');}).join('');
}

          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--acc);letter-spacing:.09em;text-transform:uppercase;margin-bottom:8px">Chance de classificação</div>
          ${st.map((t,i)=>{
            const base=[82,65,30,8];
            const jogados=t.j;
            let pct=base[i];
            if(jogados>0){
              if(i===0) pct=Math.min(98,Math.round(50+(t.pts/9)*48));
              else if(i===1) pct=Math.min(90,Math.round(30+(t.pts/9)*50));
              else if(i===2) pct=Math.max(2,Math.round(15+(t.pts/9)*30));
              else pct=Math.max(1,Math.round(5+(t.pts/9)*15));
            }
            const cor=i<2?'var(--grn)':i===2?'var(--amb)':'var(--red)';
            return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
              <div style="display:flex;align-items:center;gap:5px;width:130px">${fi(t.name,20,15)}<span style="font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--tx);text-transform:uppercase">${t.name}</span></div>
              <div style="flex:1;height:4px;background:var(--s3);border-radius:2px"><div style="width:${pct}%;height:100%;background:${cor};border-radius:2px;transition:width .4s"></div></div>
              <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${cor};min-width:30px;text-align:right">${pct}%</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- COLUNA DIREITA: análise do grupo -->
      <div style="display:flex;flex-direction:column;gap:10px">

        <!-- Progresso -->
        <div style="background:var(--s2);border:1px solid var(--bd);border-radius:var(--r8);padding:12px 14px">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--acc);letter-spacing:.09em;text-transform:uppercase;margin-bottom:8px">Grupo ${gTab} — ${jogadosG}/${totalJogos} jogos</div>
          <div style="height:4px;background:var(--s3);border-radius:2px;margin-bottom:10px"><div style="width:${Math.round(jogadosG/totalJogos*100)}%;height:100%;background:var(--acc);border-radius:2px"></div></div>
          ${jogadosG>0&&analisesGrupo?`<div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Resultados registrados</div>${analisesGrupo}`:'<div style="font-size:12px;color:var(--tx3)">Nenhum resultado registrado ainda</div>'}
        </div>

        <!-- Próximos jogos do grupo -->
        ${prxJogosHtml?`<div style="background:var(--s2);border:1px solid var(--bd);border-radius:var(--r8);padding:12px 14px">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;color:var(--acc);letter-spacing:.09em;text-transform:uppercase;margin-bottom:8px">Próximos jogos</div>
          ${prxJogosHtml}
        </div>`:''}

        <!-- Análise trader dos próximos jogos -->
        ${restantes.slice(0,2).map(j=>`
          <div style="background:var(--s2);border:1px solid var(--bd);border-left:2px solid ${j.val?'var(--acc)':'var(--bd2)'};border-radius:var(--r8);padding:12px 14px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
              ${fi(j.home,20,15)}
              <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--tx);text-transform:uppercase">${j.home}</span>
              <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3)">vs</span>
              <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--tx);text-transform:uppercase">${j.away}</span>
              ${fi(j.away,20,15)}
              ${j.val?'<span class="vtag" style="margin-left:4px">Valor</span>':''}
              <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--acc3)">${j.brt} · ${fmtDay(j.date).split(' —')[0]}</span>
            </div>
            <div style="font-size:12px;color:var(--tx2);line-height:1.65;margin-bottom:8px">${j.analise}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${(MERC[j.id]||{m:[]}).m.map(x=>`<span class="merc-pill ${x.c}"><span class="merc-pill-dot"></span>${x.t}</span>`).join('')}
            </div>
          </div>
        `).join('')}

      </div>
    </div>

    <!-- Jogos por data abaixo -->
    <div style="margin-top:16px">
      ${Object.keys(byDay).sort().map(date=>{const games=byDay[date];return `<div class="day-div"><span class="day-label">${fmtDay(date)}</span><span class="day-line"></span><span class="day-count">${games.length} jogos</span></div>`+games.sort((a,b)=>a.brt.localeCompare(b.brt)).map(j=>matchCard(j,false,false)).join('');}).join('')}
    </div>
  `;
}
function calcSt(g){
  const teams=GR[g].t.map(n=>({name:n,j:0,v:0,e:0,d:0,gp:0,gc:0,sg:0,pts:0}));
  JOGOS.filter(j=>j.g===g).forEach(jogo=>{
    const r=S.results[jogo.id];if(!r)return;
    const h=teams.find(t=>t.name===jogo.home),a=teams.find(t=>t.name===jogo.away);
    if(!h||!a)return;
    const sh=+r.sh,sa=+r.sa;
    h.j++;a.j++;h.gp+=sh;h.gc+=sa;a.gp+=sa;a.gc+=sh;
    if(sh>sa){h.v++;h.pts+=3;a.d++;}else if(sh===sa){h.e++;a.e++;h.pts++;a.pts++;}else{a.v++;a.pts+=3;h.d++;}
  });
  teams.forEach(t=>t.sg=t.gp-t.gc);
  // confronto direto entre equipes empatadas
  function h2hPts(ta, tb) {
    let pts=0;
    JOGOS.filter(j=>j.g===g&&((j.home===ta.name&&j.away===tb.name)||(j.home===tb.name&&j.away===ta.name))).forEach(j=>{
      const r=S.results[j.id]; if(!r) return;
      const sh=+r.sh,sa=+r.sa;
      if(j.home===ta.name){if(sh>sa)pts+=3;else if(sh===sa)pts+=1;}
      else{if(sa>sh)pts+=3;else if(sa===sh)pts+=1;}
    });
    return pts;
  }
  return teams.sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    if(b.sg!==a.sg) return b.sg-a.sg;
    if(b.gp!==a.gp) return b.gp-a.gp;
    // confronto direto
    const h2ha=h2hPts(a,b), h2hb=h2hPts(b,a);
    return h2hb-h2ha;
  });
}

let iaHistorico = [];


function renderArt(){
  const sc=Object.entries(S.scorers).map(([n,d])=>({name:n,...d})).filter(p=>p.gols>0).sort((a,b)=>b.gols-a.gols||b.assists-a.assists||a.name.localeCompare(b.name)).slice(0,30);

      <span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--acc);margin-left:auto;flex-shrink:0">${p.gols}</span>
    </div>
  `).join(''):'<p style="color:var(--tx3);font-size:12px;padding:6px 0">Nenhum gol registrado</p>';

  const rkAss=as.length?as.map((p,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--bd)">
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:${i<3?'var(--acc)':'var(--tx4)'};width:14px;text-align:center;flex-shrink:0">${i+1}</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;color:var(--tx);white-space:nowrap">${p.name}</span>
      ${p.team?`<span style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;text-transform:uppercase;color:var(--blu);white-space:nowrap">${p.team}</span>`:''}
      ${p.gols?`<span style="font-size:10px;color:var(--tx3);white-space:nowrap">${p.gols}G</span>`:''}
      <span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--grn);margin-left:auto;flex-shrink:0">${p.assists}</span>
    </div>
  `).join(''):'<p style="color:var(--tx3);font-size:12px;padding:6px 0">Nenhuma assistência registrada</p>';

  document.getElementById('rk-g').innerHTML=rkGols;

}

let curId=null,gRows=[];
function openM(id){
  curId=id;
  const j=JOGOS.find(x=>x.id===id);
  const r=S.results[id];
  document.getElementById('mtit').innerHTML=`${fi(j.home,20,15)} ${j.home} vs ${fi(j.away,20,15)} ${j.away}`;
  document.getElementById('lh').textContent=j.home;
  document.getElementById('la').textContent=j.away;
  document.getElementById('sh').value=r?r.sh:0;
  document.getElementById('sa').value=r?r.sa:0;
  document.getElementById('obs').value=r?r.obs:'';
  document.getElementById('dev').value=r?r.dev:'';
  gRows=r?JSON.parse(JSON.stringify(r.goals||[])):[]; renderGR();
  document.getElementById('mbg').classList.add('open');
}
function closeM(){document.getElementById('mbg').classList.remove('open');curId=null;gRows=[];}
function renderGR(){
  const j=JOGOS.find(x=>x.id===curId);
  const hName=j?j.home:'Casa';
  const aName=j?j.away:'Fora';
  const hdr=gRows.length?`<div class="gi-hdr">
    <span style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;font-family:'Barlow Condensed',sans-serif;font-weight:700">Time</span>
    <span style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;font-family:'Barlow Condensed',sans-serif;font-weight:700">Jogador</span>
    <span style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;font-family:'Barlow Condensed',sans-serif;font-weight:700">Assistência</span>
    <span style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;font-family:'Barlow Condensed',sans-serif;font-weight:700">Min.</span>
    <span></span>
  </div>`:'';
  document.getElementById('glist').innerHTML=hdr+gRows.map((g,i)=>`
    <div class="gi">
      <select class="finp" style="padding:6px 8px;font-size:12px" onchange="gRows[${i}].team=this.value;gRows[${i}].teamName=this.value==='home'?'${hName}':'${aName}'">
        <option value="" ${!g.team?'selected':''}>— time —</option>
        <option value="home" ${g.team==='home'?'selected':''}>${hName}</option>
        <option value="away" ${g.team==='away'?'selected':''}>${aName}</option>
      </select>
      <input class="finp" style="padding:7px 10px;font-size:12px" placeholder="Jogador" value="${g.p||''}" oninput="gRows[${i}].p=this.value">
      <input class="finp" style="padding:7px 10px;font-size:12px" placeholder="Assistência" value="${g.a||''}" oninput="gRows[${i}].a=this.value">
      <input class="finp" style="padding:7px 8px;font-size:12px;text-align:center" placeholder="90" type="number" min="1" max="120" value="${g.min||''}" oninput="gRows[${i}].min=this.value">
      <button class="rm-g" onclick="gRows.splice(${i},1);renderGR()">✕</button>
    </div>
  `).join('');
  // restaurar selects após render
  document.querySelectorAll('.gi select').forEach((sel,i)=>{
    if(gRows[i]&&gRows[i].team) sel.value=gRows[i].team;
  });
}
function addG(){gRows.push({p:'',a:'',team:'',teamName:'',min:''});renderGR();}
function saveR(){
  const j2=JOGOS.find(x=>x.id===curId);
  // Capturar estado atual do DOM para cada gol
  const items=document.querySelectorAll('.gi');
  const savedRows=[];
  items.forEach((row,i)=>{
    const ins=row.querySelectorAll('input');
    const sel=row.querySelector('select');
    const team=sel?sel.value:(gRows[i]?gRows[i].team:'');
    const teamName=team==='home'?(j2?j2.home:''):(team==='away'?(j2?j2.away:''):'');
    savedRows.push({
      p:ins[0]?ins[0].value.trim():(gRows[i]?gRows[i].p:''),
      a:ins[1]?ins[1].value.trim():(gRows[i]?gRows[i].a:''),
      team,teamName,
      min:ins[2]?ins[2].value.trim():(gRows[i]?gRows[i].min:'')
    });
  });
  gRows=savedRows;
  const prev=S.results[curId];
  if(prev?.goals)prev.goals.forEach(g=>{
    if(g.p&&S.scorers[g.p])S.scorers[g.p].gols=Math.max(0,(S.scorers[g.p].gols||0)-1);
    if(g.a&&S.scorers[g.a])S.scorers[g.a].assists=Math.max(0,(S.scorers[g.a].assists||0)-1);
  });
  gRows.forEach(g=>{
    if(!g.p)return;
    if(!S.scorers[g.p])S.scorers[g.p]={gols:0,assists:0,team:g.teamName||''};
    S.scorers[g.p].gols=(S.scorers[g.p].gols||0)+1;
    S.scorers[g.p].team=g.teamName||S.scorers[g.p].team;
    if(g.a){if(!S.scorers[g.a])S.scorers[g.a]={gols:0,assists:0,team:g.teamName||''};S.scorers[g.a].assists=(S.scorers[g.a].assists||0)+1;S.scorers[g.a].team=S.scorers[g.a].team||g.teamName||'';}
  });
  S.results[curId]={sh:+document.getElementById('sh').value||0,sa:+document.getElementById('sa').value||0,goals:gRows,obs:document.getElementById('obs').value.trim(),dev:document.getElementById('dev').value};
  save();closeM();showToast('Salvo!');
  // Atualizar contador global sempre
  document.getElementById('top-badge').textContent=Object.keys(S.results).length+'/72 jogos';
  const ap=document.querySelector('.pg.on');if(ap)render(ap.id.replace('pg-',''));
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
document.getElementById('mbg').addEventListener('click',function(e){if(e.target===this)closeM();});
function resetAll(){
  // Modal customizado — confirm() pode ser bloqueado em file://
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)';
  overlay.innerHTML=`<div style="background:#181c24;border:1px solid rgba(245,70,61,.4);border-radius:12px;padding:28px 32px;max-width:380px;text-align:center">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#f5463d;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Resetar dados?</div>
    <div style="font-size:13px;color:#9aa5c0;line-height:1.6;margin-bottom:20px">Todos os resultados, gols e assistências registrados serão apagados. Esta ação não pode ser desfeita.</div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button id="reset-confirm" style="background:#f5463d;color:#fff;border:none;border-radius:7px;padding:10px 24px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer">Sim, resetar</button>
      <button id="reset-cancel" style="background:transparent;color:#9aa5c0;border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:10px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;cursor:pointer">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('reset-cancel').onclick=()=>overlay.remove();
  document.getElementById('reset-confirm').onclick=()=>{
    overlay.remove();
    localStorage.removeItem('copa26l10');
    S={results:{},scorers:{}};
    renderDash();
    showToast('Dados resetados!');
  };
}
